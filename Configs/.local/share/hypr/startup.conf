# ? Assuming exec-once are launched in order as declared here

# Core
exec-once = dbus-update-activation-environment --systemd --all #? Might fail so we hardcode the variables below
exec-once = $start.DBUS_SHARE_PICKER    # dbus-update-activation-environment (one-time setup)
exec-once = $start.SYSTEMD_SHARE_PICKER # systemctl --user import-environment (one-time setup)
exec-once = $start.XDG_PORTAL_RESET     # reset-xdg-portal.sh (one-time setup)
exec-once = $start.KEYBIND_SYNC         # keyboard-switch.sh --sync-current --quiet (bind/layout repair)
exec-once = $start.THEME_OUTPUT_SYNC    # startup-sync.sh (repair Qt/Kvantum outputs for current theme)

exec-once = $start.AUTO_THEME           # auto-theme.startup (mode-aware start/stop)
exec-once = $start.IDLE_DAEMON          # hyprland-hypridle.service
exec-once = $start.IDLE_MANAGER         # hyprland-idle-manager.service
exec-once = $start.ZSH_ZCOMPDUMP        # zsh-zcompdump-clean.timer

exec-once = $start.AUTH_DIALOGUE        # hyprshell session/polkit-kde-auth (authentication agent)

exec-once = $start.WALLPAPER            # hyprshell wallpaper start --global (daemon)
exec-once = $start.BAR                  # hyprshell waybar/waybar --watch (daemon)
exec-once = $start.NOTIFICATIONS        # dunst (daemon)
exec-once = xsettingsd                  # X settings daemon (broadcasts GTK theme changes)

exec-once = $start.TEXT_CLIPBOARD       # wl-paste --watch (daemon)
exec-once = $start.IMAGE_CLIPBOARD      # wl-paste --watch (daemon)

exec-once = $start.NETWORK_MANAGER      # nm-applet (system tray)
exec-once = $start.REMOVABLE_MEDIA      # udiskie (daemon)
exec-once = $start.APPTRAY_BLUETOOTH    # blueman-applet (system tray)
exec-once = $start.BATTERY_NOTIFY       # hyprshell sysinfo/battery-notify (monitoring daemon)

exec-once = hyprshell dconf.set                        # restore cursor + desktop theme settings for the active theme

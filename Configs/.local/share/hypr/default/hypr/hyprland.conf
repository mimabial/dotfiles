$DOTFILES_HYPRLAND = set

# HyDE-style split:
# - shared core and stock assets in $XDG_DATA_HOME/hypr/
# - user overrides in $XDG_CONFIG_HOME/hypr/
# - generated current state in $XDG_STATE_HOME/hypr/
# - inspect managed ownership with: hyprshell service/show-managed-split.sh

# Bootstrap XDG paths before the first source so early includes can stay XDG-based.
# hyprlang if !XDG_CONFIG_HOME
$XDG_CONFIG_HOME = $HOME/.config
# hyprlang endif

# hyprlang if !XDG_CACHE_HOME
$XDG_CACHE_HOME = $HOME/.cache
# hyprlang endif

# hyprlang if !XDG_DATA_HOME
$XDG_DATA_HOME = $HOME/.local/share
# hyprlang endif

# hyprlang if !XDG_STATE_HOME
$XDG_STATE_HOME = $HOME/.local/state
# hyprlang endif

# Shared core layer
source = $XDG_DATA_HOME/hypr/hyprland.conf

# User override and current-state layer
source = ./windowrules.conf
source = ./keybindings.conf
source = ./monitors.conf
source = ./userprefs.conf
source = ./userfonts.conf
source = $XDG_STATE_HOME/hypr/workflows.conf
source = ./workspaces.conf

# Finalization
source = $XDG_DATA_HOME/hypr/finale.conf

# Shared Hyprland core
# Keep this file as the single orchestrator for the shared/config split.

$HYPR_SHARED_CORE = 1

# Shared core layer
source = $HOME/.local/share/hypr/variables.conf
source = $HOME/.local/share/hypr/defaults.conf
source = $HOME/.local/share/hypr/env.conf
source = $HOME/.local/share/hypr/dynamic.conf

# hyprlang if SCREEN_SHADER_COMPILED
decoration:screen_shader = $SCREEN_SHADER_COMPILED
# hyprlang endif

source = $HOME/.local/share/hypr/startup.conf

# User override layer
source = $XDG_CONFIG_HOME/hypr/windowrules.conf
source = $XDG_CONFIG_HOME/hypr/keybindings.conf
source = $XDG_CONFIG_HOME/hypr/monitors.conf
source = $XDG_CONFIG_HOME/hypr/userprefs.conf
source = $XDG_CONFIG_HOME/hypr/userfonts.conf
source = $XDG_CONFIG_HOME/hypr/workflows.conf
source = $XDG_CONFIG_HOME/hypr/workspaces.conf

# Finalization
source = $HOME/.local/share/hypr/finale.conf

# -- [ tpm/plugins ] -----------------------------------------------------------
# tmux plugin manager: https://github.com/tmux-plugins/tpm
set-environment -g "TMUX_PLUGIN_MANAGER_PATH" "$XDG_DATA_HOME/tmux/plugins"

# NOTE:
# prefix+I            -> install
# prefix+U            -> update
# prefix+alt+u (M-u)  -> uninstall

set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-battery"
set -g @plugin "tmux-plugins/tmux-cpu"
set -g @plugin "tmux-plugins/tmux-yank"
if-shell "command -v xdg-open 2>/dev/null" { set -g @plugin 'tmux-plugins/tmux-open' }
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @plugin "NHDaly/tmux-better-mouse-mode"
set -g @plugin "soyuka/tmux-current-pane-hostname"
set -g @plugin "schasse/tmux-jump"
set -g @plugin "fcsonline/tmux-thumbs"
set -g @plugin "jaclu/tmux-menus"
set -g @plugin "olimorris/tmux-pomodoro-plus"
set -g @plugin 'MunifTanjim/tmux-suspend'
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"

## -- tmux-suspend
set -g @suspend_key 'F6'
set -g @suspend_suspended_options " \
  @mode_indicator_custom_prompt:: 󰏤 , \
  @mode_indicator_custom_mode_style::bg=#{@theme_gray}\\,fg=#{@theme_bg}, \
"

## -- tmux-mode-indicator
set -g @mode_indicator_prefix_prompt "  WAIT "
set -g @mode_indicator_copy_prompt "  COPY "
set -g @mode_indicator_sync_prompt " 󰓦 SYNC "
set -g @mode_indicator_empty_prompt " #S TMUX "
set -g @mode_indicator_prefix_mode_style 'fg=#{@theme_bg},bg=#{@theme_red},italics'
set -g @mode_indicator_copy_mode_style 'fg=#{@theme_bg},bg=#{@theme_yellow},italics'
set -g @mode_indicator_sync_mode_style 'fg=#{@theme_bg},bg=#{@theme_accent},italics'
set -g @mode_indicator_empty_mode_style 'fg=#{@theme_fg},bg=#{@color0},bold'

## -- tmux cpu
set -g @cpu_percentage_format "%3.0f%% "
set -g @cpu_low_fg_color "#[fg=#{@theme_green}]"
set -g @cpu_medium_fg_color "#[fg=#{@theme_yellow}]"
set -g @cpu_high_fg_color "#[fg=#{@theme_red}]"

## -- tmux-yank
set -g @override_copy_command "$XDG_CONFIG_HOME/tmux/scripts/tmux-copy"

## -- tmux-pomodoro-plus
set -g @pomodoro_notifications 'on'
set -g @pomodoro_toggle 'o'
set -g @pomodoro_cancel 'O'
set -g @pomodoro_skip '-'
set -g @pomodoro_mins 25
set -g @pomodoro_break_mins 5
set -g @pomodoro_intervals 4
set -g @pomodoro_long_break_mins 25
set -g @pomodoro_repeat 'off'
set -g @pomodoro_on "#[fg=#{@theme_red}] "
set -g @pomodoro_complete "#[fg=#{@theme_green}]"
set -g @pomodoro_pause "#[fg=#{@theme_yellow}] "
set -g @pomodoro_prompt_break " break?"
set -g @pomodoro_prompt_pomodoro " start?"
set -g @pomodoro_show_intervals "#[fg=#{@theme_gray}] [%s/%s]"
set -g @pomodoro_menu_position "R"
set -g @pomodoro_sound 'Pop'
set -g @pomodoro_granularity 'off'

## -- tmux-jump
set -g @jump-key "/"

## -- tmux-thumbs
set -g @thumbs-key 'C-f'
set -g @thumbs-unique enabled
set -g @thumbs-contrast 1
set -g @thumbs-hint-fg-color red
set -g @thumbs-command '/home/rifle/.config/tmux/scripts/tmux-open {}'
set -g @thumbs-upcase-command 'printf %s {} | "/home/rifle/.config/tmux/scripts/tmux-copy" && tmux display-message "Copied {}"'

## -- tmux-battery
set -g @batt_icon_charge_tier8 ""
set -g @batt_icon_charge_tier7 ""
set -g @batt_icon_charge_tier6 ""
set -g @batt_icon_charge_tier5 ""
set -g @batt_icon_charge_tier4 ""
set -g @batt_icon_charge_tier3 ""
set -g @batt_icon_charge_tier2 ""
set -g @batt_icon_charge_tier1 ""
set -g @batt_icon_status_charged "󱈑"
set -g @batt_icon_status_charging "󰂄"
set -g @batt_icon_status_discharging "󰂌"
set -g @batt_icon_status_attached ""
set -g @batt_icon_status_unknown "󰂑"
set -g @batt_color_status_primary_charged "#{@theme_green}"
set -g @batt_color_status_primary_charging "#{@theme_accent}"
set -g @batt_color_status_primary_discharging "#{@theme_red}"
set -g @batt_color_status_primary_attached "#{@theme_accent}"
set -g @batt_color_status_primary_unknown "#{@theme_gray}"
set -g @batt_color_charge_primary_tier8 "#{@theme_green}"
set -g @batt_color_charge_primary_tier7 "#{@theme_green}"
set -g @batt_color_charge_primary_tier6 "#{@theme_green}"
set -g @batt_color_charge_primary_tier5 "#{@theme_yellow}"
set -g @batt_color_charge_primary_tier4 "#{@theme_yellow}"
set -g @batt_color_charge_primary_tier3 "#{@theme_yellow}"
set -g @batt_color_charge_primary_tier2 "#{@theme_red}"
set -g @batt_color_charge_primary_tier1 "#{@theme_red}"
set -g @batt_remain_short true

## -- tmux-popup / fzf options
TMUX_FZF_OPTIONS="-p -w 50% -h 50% -m"

## -- tmux-menus
unbind-key -n MouseDown3Pane
unbind-key -n M-MouseDown3Pane
unbind-key -n MouseDown3Status
unbind-key -n MouseDown3StatusLeft
unbind-key <
unbind-key >
set -g @menus_trigger "C-m"

## -- extrakto
set -g @extrakto_key "tab"
set -g @extrakto_popup_size "50%"

## -- tmux-text-macros
set -g @ttm-load-default-macros on
set -g @ttm-window-mode 'vertical'

if "test ! -d \"$XDG_DATA_HOME/tmux/plugins/tpm\"" \
   "run 'git clone https://github.com/tmux-plugins/tpm \"$XDG_DATA_HOME/tmux/plugins/tpm\" && \"$XDG_DATA_HOME/tmux/plugins/tpm/bin/install_plugins\"'"
run-shell "$XDG_DATA_HOME/tmux/plugins/tpm/tpm"
run-shell "$XDG_CONFIG_HOME/tmux/scripts/tmux-refresh-status-plugins"

# MPD Configuration
# Music Player Daemon

# Music directory
music_directory    "~/Music"

# Database and state files
db_file            "~/.local/state/mpd/database"
log_file           "~/.local/state/mpd/log"
pid_file           "~/.local/state/mpd/pid"
state_file         "~/.local/state/mpd/state"
sticker_file       "~/.local/state/mpd/sticker.sql"
playlist_directory "~/.local/state/mpd/playlists"

# Bind to localhost
bind_to_address    "127.0.0.1"
port               "6600"

# Audio output (PipeWire/PulseAudio)
audio_output {
    type           "pipewire"
    name           "PipeWire Output"
    enabled        "yes"
}

# Fallback to PulseAudio if PipeWire unavailable
audio_output {
    type           "pulse"
    name           "PulseAudio Output"
    enabled        "no"
}

# FIFO output for visualizers (cava, etc.)
audio_output {
    type           "fifo"
    name           "FIFO Output"
    path           "/tmp/mpd.fifo"
    format         "44100:16:2"
}

# HTTP stream output (optional)
audio_output {
    type           "httpd"
    name           "HTTP Stream"
    encoder        "opus"
    port           "8000"
    bind_to_address "127.0.0.1"
    max_clients    "8"
    enabled        "no"
}

# General settings
auto_update        "yes"
restore_paused     "yes"
max_output_buffer_size "16384"

# Character encoding
filesystem_charset "UTF-8"

# Network settings
max_connections    "10"

# Input plugins
input {
    plugin         "curl"
}

# Resampler (for better quality)
resampler {
    plugin         "soxr"
    quality        "very high"
}

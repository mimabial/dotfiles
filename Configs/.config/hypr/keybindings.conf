## в–Ҳв–„в–ҖвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–„вҖғв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җ
## в–Ҳв–‘в–ҲвҖғв–Ҳв–Ҳв–„вҖғв–‘в–Ҳв–‘вҖғв–Ҳв–„в–ҲвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҲвҖғв–„в–Ҳ

# see https://wiki.hyprland.org/configuring/keywords/ for more
# example binds, see https://wiki.hyprland.org/configuring/binds/ for more

# Group bind descriptions with a local metadata prefix:
#   $d=[Main|Subgroup1|Subgroup2|...]
# This is only descriptive text for bind hints and menus.

$MMOD = $mainMod

$wm=Window Management
$d=[$wm]
bindd = $MMOD, Q, $d close focused window, exec, hyprshell dont-kill-steam.sh
bindd = ALT, F4, $d close focused window, exec, hyprshell dont-kill-steam.sh
bindd = $MMOD ALT, Q, $d close all windows, exec, hyprshell window/close-all.sh
bindd = $MMOD, F, $d toggle floating, togglefloating
bindd = $MMOD, P, $d toggle pin on focused window, exec, hyprshell window/windowpin.sh
bindd = $MMOD SHIFT, F, $d toggle fullscreen (entire screen), fullscreen, 0
bindd = $MMOD ALT, F, maximize window (keep gaps and bars), fullscreen, 1
bindd = $MMOD, J, toggle window split, layoutmsg, togglesplit
bindd = $MMOD SHIFT, J, toggle workspace layout, exec, hyprshell window/layout-toggle.sh
bindd = $MMOD, PERIOD, $d mode focused window one column into the next column, exec, layoutmsg, move +col
bindd = $MMOD, COMMA, $d swaps the focused windowвҖҷs current column with the column to the left , exec, layoutmsg, swapcol l


$d=[$wm|Change focus]
bindd = $MMOD, LEFT, $d focus left, movefocus, l
bindd = $MMOD, RIGHT, $d focus right , movefocus, r
bindd = $MMOD, UP, $d focus up , movefocus, u
bindd = $MMOD, DOWN , $d focus down, movefocus, d
bindd = ALT, TAB, Cycle to next window, cyclenext
bindd = ALT SHIFT, TAB, Cycle to prev window, cyclenext, prev
bindd = ALT, TAB, Reveal active window on top, bringactivetotop
bindd = ALT SHIFT, TAB, Reveal active window on top, bringactivetotop

$d=[$wm|Resize Active Window]
# Resize windows
bindde = $MMOD SHIFT, RIGHT, $d resize window right , resizeactive, 30 0
bindde = $MMOD SHIFT, LEFT, $d resize window left, resizeactive, -30 0
bindde = $MMOD SHIFT, UP, $d resize window up, resizeactive, 0 -30
bindde = $MMOD SHIFT, DOWN, $d resize  window down, resizeactive, 0 30

# Move active window around current workspace with MMOD + SHIFT + CTRL [вҶҗвҶ’вҶ‘вҶ“]
$d=[$wm|Move active window across workspace]
$moveactivewindow=grep -q "true" <<< $(hyprctl activewindow -j | jq -r .floating) && hyprctl dispatch moveactive
bindde = $MMOD ALT, LEFT, Move active window to the left, exec, $moveactivewindow -30 0 || hyprctl dispatch movewindow l
bindde = $MMOD ALT, RIGHT, Move active window to the right, exec, $moveactivewindow 30 0 || hyprctl dispatch movewindow r
bindde = $MMOD ALT, UP, Move active window up, exec, $moveactivewindow  0 -30 || hyprctl dispatch movewindow u
bindde = $MMOD ALT, DOWN, Move active window down, exec, $moveactivewindow 0 30 || hyprctl dispatch movewindow d

# Move/Resize focused window
$d=[$wm|Move & Resize with mouse]
binddm = $MMOD, mouse:272, $d hold to move window, movewindow
binddm = $MMOD, mouse:273, $d hold to resize window, resizewindow
binddm = $MMOD, Z, $d hold to move window , movewindow
binddm = $MMOD, X, $d hold to resize window, resizewindow

$d=[$wm]
bindd = $MMOD, DELETE, $d kill hyprland session, exec, hyprshell logout
bindd = $MMOD, L, $d lock screen, exec, hyprshell lock-screen.sh
bindd = CTRL ALT, DELETE, $d logout menu, exec, hyprshell logout-launch.sh 2
bindd = $MMOD, I, $d toggle keep awake, exec, hyprshell session/toggle-keep-awake.sh

$l=Launcher
$d=[$l|Apps]
bindd = $MMOD, RETURN, $d quick terminal (cwd) , exec, $TERMINAL --working-directory "$(hyprshell terminal-cwd.sh)"
bindd = $MMOD SHIFT, RETURN, $d tmux terminal (cwd) , exec, $TERMINAL2 --working-directory "$(hyprshell terminal-cwd.sh)"
bindd = $MMOD ALT, RETURN, $d dropdown terminal (cwd) , exec, hyprshell window/dropdown-terminal
bindd = $MMOD, D, $d file explorer , exec, $EXPLORER
bindd = $MMOD SHIFT, D, $d file explorer (cwd) , exec, $EXPLORER "$(hyprshell terminal-cwd.sh)"
bindd = $MMOD, B, $d web browser , exec, $BROWSER
bindd = $MMOD SHIFT, B, $d web browser (private) , exec, hyprshell browser.sh --private
bindd = $MMOD CTRL, S, $d signal , exec, hyprshell launch/summon.sh --empty-workspace-if-occupied signal -- signal-desktop
bindd = $MMOD CTRL, B, $d bitwarden , exec, hyprshell launch/summon.sh --align center bitwarden -- bitwarden-desktop
bindd = $MMOD ALT, G, $d gimp , exec, hyprshell launch/summon.sh --empty-workspace-if-occupied gimp -- gimp
bindd = $MMOD, C, $d text editor , exec, $TERMINAL -e $EDITOR

$d=[$l|Launcher menus]
bindd = $MMOD, A, $d application finder , exec, hyprshell rofi-launch.sh d
bindd = $MMOD CTRL, TAB, $d window switcher , exec, hyprshell rofi-launch.sh w
bindd = $MMOD CTRL, F, $d fzf file finder , exec, pkill -x rofi || hyprshell launch/file-finder.sh
bindd = $MMOD, SPACE, $d menu tree, exec, pkill -x rofi || hyprshell menutree
bindd = $MMOD, SLASH, $d keybindings hint, exec, pkill -x rofi || hyprshell keybinds_hint.sh c # launch keybinds hint
bindd = $MMOD, E, $d emoji  picker , exec, pkill -x rofi || hyprshell emoji-picker.sh # launch emoji picker
bindd = $MMOD, G, $d glyph picker , exec, pkill -x rofi || hyprshell glyph-picker.sh # launch glyph picker
bindd = $MMOD, H, $d box drawing character picker , exec, pkill -x rofi || hyprshell boxdraw-picker.sh # launch glyph picker
bindd = $MMOD, V, $d clipboard ,  exec, pkill -x rofi || hyprshell cliphist.sh -c # launch clipboard,
bindd = $MMOD SHIFT, V, $d clipboard manager , exec, pkill -x rofi || hyprshell cliphist.sh # launch clipboard Manager

$d=[$l|Dev Tools]
bindd = $MMOD CTRL, G, $d LazyGit, exec, hyprshell launch/lazygit.sh
bindd = $MMOD CTRL, D, $d LazyDocker, exec, hyprshell launch/lazydocker.sh
bindd = $MMOD CTRL, T, $d HTop System Monitor, exec, hyprshell launch/tui.sh --app-id org.tui.Htop -- htop
bindd = $MMOD ALT, P, $d Rmpc Music Player, exec, hyprshell launch/tui.sh --app-id org.tui.Rmpc -- rmpc

$hc=Hardware Controls
$d=[$hc|Audio]
bindd = $MMOD SHIFT, O, Audio output switcher, exec, hyprshell audio-switch.sh
binddl  = $MMOD, F10, $d toggle mute output , exec, hyprshell volume-control.sh -o m # toggle audio mute
binddl  = $MMOD CTRL, F10, $d toggle mute focused window audio, exec, hyprshell window-mute.py
binddl  = , XF86AudioMute,$d  toggle mute output, exec, hyprshell volume-control.sh -o m # toggle audio mute
binddel = $MMOD, F11, $d decrease volume , exec, hyprshell volume-control.sh -o d # decrease volume
binddel = $MMOD, F12, $d increase volume , exec, hyprshell volume-control.sh -o i # increase volume
binddl  = , XF86AudioMicMute,$d un/mute microphone  , exec, hyprshell volume-control.sh -i m # toggle microphone mute
binddel = , XF86AudioLowerVolume, $d decrease volume , exec, hyprshell volume-control.sh -o d # decrease volume
binddel = , XF86AudioRaiseVolume, $d increase volume , exec, hyprshell volume-control.sh -o i # increase volume

$d=[$hc|Media]
binddl  = , XF86AudioPlay,$d play media, exec, playerctl play-pause # toggle between media play and pause
binddl  = , XF86AudioPause,$d pause media, exec, playerctl play-pause # toggle between media play and pause
binddl  = , XF86AudioNext,$d next media  , exec, playerctl next # media next
binddl  = , XF86AudioPrev,$d  previous media , exec, playerctl previous # media previous

$d=[$hc|Brightness]
binddel = , XF86MonBrightnessUp, $d increase brightness , exec, hyprshell brightness-control.sh i # increase brightness
binddel = , XF86MonBrightnessDown, $d decrease brightness , exec, hyprshell brightness-control.sh d # decrease brightness

$ut=Utilities
$d=[$ut]
binddl = $MMOD, K, $d toggle keyboard layout , exec, hyprshell keyboard-switch.sh # switch keyboard layout
bindd = $MMOD, M, $d focus mode , exec, hyprshell focusmode.sh # disable hypr effects for focusmode
bindd = $MMOD SHIFT, M, $d game mode , exec, hyprshell gamemode.sh # disable hypr effects for gamemode

$d=[$ut|Screen Capture]
bindd = $MMOD SHIFT, P, $d smart screenshot, exec, hyprshell screenshot.sh smart # smart selection with window detection
bindd = $MMOD CTRL, P, $d color picker, exec, pkill -x rofi || hyprshell rofi/color-picker.sh
binddl = , Print, $d print all monitors , exec, hyprshell screenshot.sh p # all monitors screenshot capture

$d=[$ut|Screen Recording]
bindd = $MMOD SHIFT, R, $d toggle screen recording with webcam, exec, hyprshell screenrecord --toggle --audio --webcam # toggle recording with webcam
bindd = $MMOD ALT, R, $d toggle monitor recording, exec, hyprshell screenrecord --toggle --audio --output # toggle full monitor recording
bindd = $MMOD CTRL, R, $d stop recording, exec, hyprshell screenrecord --quit # stop any active recording

# These selectors are available here individually and under Home > Style.
$rice=Theming and Wallpaper
$d=[$rice]
bindd = $MMOD, APOSTROPHE, $d next global wallpaper , exec, hyprshell wallpaper.sh -Gn # next global wallpaper
bindd = $MMOD, SEMICOLON, $d previous global wallpaper , exec, hyprshell wallpaper.sh -Gp # previous global wallpaper
bindd = $MMOD, BRACKETRIGHT, $d select next theme, exec, pkill -x rofi || hyprshell theme.switch.sh -n
bindd = $MMOD, BRACKETLEFT, $d select previous theme, exec, pkill -x rofi || hyprshell theme.switch.sh -p
bindd = $MMOD, W, $d select a global wallpaper , exec, pkill -x rofi || hyprshell wallpaper.sh -SG # launch wallpaper select menu
bindd = $MMOD, T, $d select a theme, exec, pkill -x rofi || hyprshell theme.select.sh # launch theme select menu
bindd = $MMOD SHIFT, COMMA, $d next waybar layout , exec, hyprshell waybar.py --update --next # next waybar mode
bindd = $MMOD SHIFT, PERIOD, $d previous waybar layout , exec, hyprshell waybar.py --update --prev # previous waybar mode
bindd = $MMOD SHIFT, W, $d toggle waybar and reload config, exec, hyprshell waybar.py --hide
bindd = $MMOD SHIFT, C, $d pywal16 mode selector , exec, pkill -x rofi || hyprshell wal.toggle.sh -m # launch pywal16 mode select menu
bindd = $MMOD, N, $d select font, exec, pkill -x rofi || hyprshell fonts/font-picker.sh # font picker (calls fonts/font-set.sh)
bindd = $MMOD SHIFT, T, $d select theme rofi style, exec, pkill -x rofi || hyprshell theme.select.sh -s # launch select menu
bindd = $MMOD SHIFT, A, $d select launcher style, exec, hyprshell rofi-launch.sh -s # launch launcher style select menu

$ws=Workspaces
$d=[$ws|Navigation]
bindd = $MMOD, code:10, $d navigate to workspace 1 , workspace, 1
bindd = $MMOD, code:11, $d navigate to workspace 2 , workspace, 2
bindd = $MMOD, code:12, $d navigate to workspace 3 , workspace, 3
bindd = $MMOD, code:13, $d navigate to workspace 4 , workspace, 4
bindd = $MMOD, code:14, $d navigate to workspace 5 , workspace, 5
bindd = $MMOD, code:15, $d navigate to workspace 6 , workspace, 6
bindd = $MMOD, code:16, $d navigate to workspace 7 , workspace, 7
bindd = $MMOD, code:17, $d navigate to workspace 8 , workspace, 8
bindd = $MMOD, code:18, $d navigate to workspace 9 , workspace, 9
bindd = $MMOD, code:19, $d navigate to workspace 10 , workspace, 10

$d=[$ws|Navigation|Relative workspace]
bindd = $MMOD CTRL, RIGHT, $d change active workspace forwards  , workspace, r+1
bindd = $MMOD CTRL, LEFT, $d change active workspace backwards , workspace, r-1
bindd = $MMOD CTRL, DOWN, $d navigate to the nearest empty workspace , workspace, empty

bindd = $MMOD, TAB, Next workspace, workspace, e+1
bindd = $MMOD SHIFT, TAB, Previous workspace, workspace, e-1
bindd = $MMOD ALT, TAB, Former workspace, workspace, previous

bindd = $MMOD SHIFT ALT, LEFT, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = $MMOD SHIFT ALT, RIGHT, Move workspace to right monitor, movecurrentworkspacetomonitor, r
bindd = $MMOD SHIFT ALT, UP, Move workspace to up monitor, movecurrentworkspacetomonitor, u
bindd = $MMOD SHIFT ALT, DOWN, Move workspace to down monitor, movecurrentworkspacetomonitor, d

# Move focused window to a workspace
$d=[$ws|Move window to workspace]
bindd = $MMOD SHIFT, code:10, $d move to workspace 1 , movetoworkspace, 1
bindd = $MMOD SHIFT, code:11, $d move to workspace 2 , movetoworkspace, 2
bindd = $MMOD SHIFT, code:12, $d move to workspace 3 , movetoworkspace, 3
bindd = $MMOD SHIFT, code:13, $d move to workspace 4 , movetoworkspace, 4
bindd = $MMOD SHIFT, code:14, $d move to workspace 5 , movetoworkspace, 5
bindd = $MMOD SHIFT, code:15, $d move to workspace 6 , movetoworkspace, 6
bindd = $MMOD SHIFT, code:16, $d move to workspace 7 , movetoworkspace, 7
bindd = $MMOD SHIFT, code:17, $d move to workspace 8 , movetoworkspace, 8
bindd = $MMOD SHIFT, code:18, $d move to workspace 9 , movetoworkspace, 9
bindd = $MMOD SHIFT, code:19, $d move to workspace 10 , movetoworkspace, 10

# Move focused window to a relative workspace
$d=[$ws]
bindd = $MMOD CTRL+ALT, RIGHT, $d move window to next relative workspace , movetoworkspace, r+1
bindd = $MMOD CTRL+ALT, LEFT, $d move window to previous relative workspace , movetoworkspace, r-1

# Scroll through existing workspaces
$d=[$ws|Navigation]
bindd = $MMOD, mouse_down, $d next workspace, workspace, e+1
bindd = $MMOD, mouse_up, $d previous workspace, workspace, e-1

# Move/Switch to special workspace (scratchpad)
$d=[$ws|Navigation|Special workspace]
bindd = $MMOD SHIFT, S, $d move to scratchpad  , movetoworkspace, special
bindd = $MMOD ALT, S, $d move to scratchpad (silent) , movetoworkspacesilent, special
bindd = $MMOD, S, $d toggle scratchpad ,  togglespecialworkspace

# Move focused window to a workspace silently
$d=[$ws|Navigation|Move window silently]
bindd = $MMOD ALT, code:1o, $d move to workspace 1  (silent), movetoworkspacesilent, 1
bindd = $MMOD ALT, code:11, $d move to workspace 2  (silent), movetoworkspacesilent, 2
bindd = $MMOD ALT, code:12, $d move to workspace 3  (silent), movetoworkspacesilent, 3
bindd = $MMOD ALT, code:13, $d move to workspace 4  (silent), movetoworkspacesilent, 4
bindd = $MMOD ALT, code:14, $d move to workspace 5  (silent), movetoworkspacesilent, 5
bindd = $MMOD ALT, code:15, $d move to workspace 6  (silent), movetoworkspacesilent, 6
bindd = $MMOD ALT, code:16, $d move to workspace 7  (silent), movetoworkspacesilent, 7
bindd = $MMOD ALT, code:17, $d move to workspace 8  (silent), movetoworkspacesilent, 8
bindd = $MMOD ALT, code:18, $d move to workspace 9  (silent), movetoworkspacesilent, 9
bindd = $MMOD ALT, code:19, $d move to workspace 10 (silent), movetoworkspacesilent, 10


$d=
# unset the group name

# Auto Theme Configuration
# Sunrise/sunset scheduler

# === Location (for sunrise/sunset calculation) ===
# Use "auto" to detect via IP geolocation
# Or set manually: https://www.latlong.net/
# Private override (recommended for dotfiles users):
#   export AUTO_THEME_LATITUDE="<lat>"
#   export AUTO_THEME_LONGITUDE="<lon>"
#   export AUTO_THEME_TIMEZONE="<tz>"
# in ~/.local/state/hypr/config (not tracked in git)
latitude = auto
longitude = auto
timezone = auto

# === Timing ===
# Watchdog fallback interval (seconds)
# Event-driven wakeups are primary; this is safety fallback.
check_interval_seconds = 60

# Minutes after sunrise / before sunset to switch
# (accounts for twilight)
sun_offset_minutes = 30

# === What to Control ===
control_hyprland = true
control_nvim = true

# === Manual Override ===
# How long manual toggle lasts before auto resumes (minutes)
# Set to 0 to disable auto-resume
manual_override_duration = 120

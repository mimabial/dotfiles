
# █░█░█ █ █▄░█ █▀▄ █▀█ █░█░█   █▀█ █░█ █░░ █▀▀ █▀
# ▀▄▀▄▀ █ █░▀█ █▄▀ █▄█ ▀▄▀▄▀   █▀▄ █▄█ █▄▄ ██▄ ▄█

# See https://wiki.hyprland.org/Configuring/Window-Rules/

# '$&' is a specific shorthand for "override" \\ analogous to a reference
# This symbol indicates that the following values will override the default configuration
$&=override

# idle_inhibit rules
windowrule = idle_inhibit fullscreen true, match:class ^(.*haruna.*)$
windowrule = idle_inhibit fullscreen true, match:class ^(.*firefox.*)$|^(.*chromium.*)$

# Picture-in-Picture
windowrule = tag +picture-in-picture, match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrule = float 1, match:tag picture-in-picture
windowrule = keep_aspect_ratio 1, match:tag picture-in-picture
windowrule = move 73% 72%, match:tag picture-in-picture
windowrule = size 25% 25%, match:tag picture-in-picture
windowrule = pin 1, match:tag picture-in-picture

# Dropdown Terminal
windowrule = float 1, match:class ^(dropdown-terminal)$
windowrule = opacity 0.90 $& 0.90 $& 1, match:class ^(dropdown-terminal)$

windowrule = fullscreen 1, match:class ^(org\.kde\.haruna)$, match:initial_title ^Haruna$
windowrule = float 1, match:class ^(org\.kde\.haruna)$

windowrule = opacity 0.90 $& 0.90 $& 1, match:class ^(firefox)$
windowrule = opacity 0.90 $& 0.90 $& 1, match:class ^(brave-browser)$
windowrule = opacity 0.80 $& 0.80 $& 1, match:class ^(kitty)$
windowrule = opacity 0.80 $& 0.80 $& 1, match:class ^(Alacritty)$
windowrule = opacity 0.80 $& 0.80 $& 1, match:class ^(org\.kde\.dolphin)$
windowrule = opacity 0.80 $& 0.80 $& 1, match:class ^(org\.kde\.ark)$
windowrule = opacity 0.80 $& 0.80 $& 1, match:class ^(nwg-look)$
windowrule = opacity 0.80 $& 0.80 $& 1, match:class ^(nwg-displays)$
windowrule = opacity 0.80 $& 0.80 $& 1, match:class ^(qt5ct)$
windowrule = opacity 0.80 $& 0.80 $& 1, match:class ^(qt6ct)$
windowrule = opacity 0.80 $& 0.80 $& 1, match:class ^(kvantummanager)$
windowrule = opacity 0.80 $& 0.70 $& 1, match:class ^(.*pavucontrol.*)$
windowrule = opacity 0.80 $& 0.70 $& 1, match:class ^(blueman-manager)$
windowrule = opacity 0.80 $& 0.70 $& 1, match:class ^(nm-applet)$
windowrule = opacity 0.80 $& 0.70 $& 1, match:class ^(nm-connection-editor)$
windowrule = opacity 0.80 $& 0.70 $& 1, match:class ^(org\.kde\.polkit-kde-authentication-agent-1)$
windowrule = opacity 0.80 $& 0.70 $& 1, match:class ^(polkit-gnome-authentication-agent-1)$
windowrule = opacity 0.80 $& 0.70 $& 1, match:class ^(org\.freedesktop\.impl\.portal\.desktop\.gtk)$
windowrule = opacity 0.80 $& 0.70 $& 1, match:class ^(org\.freedesktop\.impl\.portal\.desktop\.hyprland)$
windowrule = opacity 0.70 $& 0.70 $& 1, match:class ^([Ss]team)$
windowrule = opacity 0.70 $& 0.70 $& 1, match:class ^(steamwebhelper)$
windowrule = fullscreen on, match:class ^([Ss]team)$, match:title ^(Steam)$

windowrule = opacity 0.80 0.80, match:class ^(com\.github\.tchx84\.Flatseal)$ # Flatseal-Gtk
windowrule = opacity 0.80 0.80, match:class ^(net\.davidotek\.pupgui2)$ # ProtonUp-Qt
windowrule = opacity 0.80 0.80, match:class ^(yad)$ # Protontricks-Gtk
windowrule = opacity 0.80 0.80, match:class ^(signal)$ # Signal-Gtk
windowrule = opacity 0.80 0.80, match:class ^(org\.pwmt\.zathura)$ # Zathura PDF
windowrule = opacity 0.80 0.80, match:class ^([Bb]itwarden)$ # Bitwarden
windowrule = opacity 0.90 0.90, match:class ^(chromium)$ # Chromium
windowrule = opacity 0.80 0.80, match:class ^(io\.github\.spacingbat3\.webcord)$ # WebCord
windowrule = opacity 0.80 0.80, match:class ^(org\.kde\.skanlite)$ # Skanlite Scanner
windowrule = opacity 0.80 0.80, match:class ^(com\.github\.huluti\.Curtail)$ # Curtail (Elephant)
windowrule = opacity 0.80 0.80, match:class ^(com\.github\.jeromerobert\.pdfarranger)$ # PDF Arranger
windowrule = opacity 0.80 0.80, match:class ^(com\.gabm\.satty)$ # Satty Screenshot Editor

windowrule = match:class ^(org\.gnome\.Loupe)$, suppress_event fullscreen
windowrule = match:class ^(org\.gnome\.Loupe)$, match:modal false, fullscreen 1 # Imageviewer-Gtk
windowrule = match:class ^([Ll]ibreoffice(-writer|-calc|-impress|-draw|-base|-math|-startcenter)?)$, match:modal false, fullscreen 1 # LibreOffice
windowrule = match:class ^(qalculate-gtk)$, float 1 # Qalculate

windowrule = float 1, match:class ^(blueman-manager)$
windowrule = float 1, match:class ^(com\.github\.rafostar\.Clapper)$ # Clapper-Gtk
windowrule = float 1, match:class ^(app\.drey\.Warp)$ # Warp-Gtk
windowrule = float 1, match:class ^(net\.davidotek\.pupgui2)$ # ProtonUp-Qt
windowrule = float 1, match:class ^(yad)$ # Protontricks-Gtk
windowrule = float 1, match:class ^(io\.github\.alainm23\.planify)$ # planify-Gtk
windowrule = float 1, match:class ^(io\.gitlab\.theevilskeleton\.Upscaler)$ # Upscaler-Gtk
windowrule = float 1, match:class ^(com\.github\.unrud\.VideoDownloader)$ # VideoDownloader-Gkk
windowrule = float 1, match:class ^(io\.gitlab\.adhami3310\.Impression)$ # Impression-Gtk
windowrule = float 1, match:class ^(org\.kde\.partitionmanager)$
windowrule = float 0, match:class ^(com\.transmissionbt\.transmission|transmission-gtk).*$, match:title ^Transmission$ # Transmission main window
windowrule = float 0, match:class ^(com\.transmissionbt\.transmission|transmission-gtk).*$, match:title ^Transmission Preferences$ # Prevent overflow on small logical screens
windowrule = match:class ^(xdg-desktop-portal-gtk)$, float 1
windowrule = match:class ^(xdg-desktop-portal-gtk)$, center 1
windowrule = float 1, match:class ^(hyprland-share-picker)$
windowrule = center 1, match:class ^(hyprland-share-picker)$
# windowrule = float 1, match:class ^(org\.kde\.ark)$ # Ark Archive Manager
windowrule = float 1, match:class ^(org\.pwmt\.zathura)$ # Zathura PDF
windowrule = float 1, match:class ^([Bb]itwarden)$ # Bitwarden
windowrule = float 1, match:class ^(org\.kde\.skanlite)$ # Skanlite Scanner
windowrule = float 1, match:class ^(com\.gabm\.satty)$ # Satty Screenshot Editor
windowrule = center 1, match:class ^(com\.gabm\.satty)$
windowrule = float 1, match:class ^(localsend)$ # LocalSend
windowrule = center 1, match:class ^(localsend)$
windowrule = float 1, match:class ^(nwg-displays)$
windowrule = match:class ^(org\.kde\.keditfiletype)$, float 1

# workaround for jetbrains IDEs dropdowns/popups cause flickering
windowrule = no_initial_focus 1, match:class ^(.*jetbrains.*)$, match:title ^(win[0-9]+)$

# █░░ ▄▀█ █▄█ █▀▀ █▀█   █▀█ █░█ █░░ █▀▀ █▀
# █▄▄ █▀█ ░█░ ██▄ █▀▄   █▀▄ █▄█ █▄▄ ██▄ ▄█

layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0, match:namespace rofi
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0, match:namespace notifications
layerrule = blur on, match:namespace logout_dialog

# TUI applications
windowrule = float 1, match:class ^(org\.tui\..*|org\.font\..*|lazygit|lazydocker)$
windowrule = center 1, match:class ^(org\.tui\..*|org\.font\..*|lazygit|lazydocker)$

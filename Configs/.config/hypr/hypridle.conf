# Configuring hypridle
# See: https://wiki.hypr.land/Hypr-Ecosystem/hypridle/
# 
# hypridle.conf - Hypridle configuration
# Handles idle actions: dim, lock, DPMS, suspend, and custom listeners
# 
# Listeners: Each listener block defines an idle timeout and actions to run
# 
# For more info, see: https://wiki.hypr.land/Hypr-Ecosystem/hypridle/

$LOCK_CMD = hyprshell lock-screen.sh # Calls $LOCKSCREEN default is hyprlock
$UNLOCK_CMD = sh -c 'pkill -9 $(hyprshell lock-screen --get)' # kills the lockscreen for cleanup

general {
    lock_cmd = $LOCK_CMD # command when `loginctl lock-session` is called
    unlock_cmd = $UNLOCK_CMD # command when `loginctl unlock-session` is called
    ignore_dbus_inhibit = true             # Ignore dbus idle-inhibit requests
    ignore_systemd_inhibit = true          # Ignore systemd-inhibit --what=idle
    # before_sleep_cmd =     # command ran before sleep
    # after_sleep_cmd = # notify-send "Awake!"  # command ran after sleep
}

# // --- Listener: Dim display after 60s idle ---
listener {
    timeout = 60
    on-timeout = hyprshell controls/brightness-idle.sh dim # Save and dim only when a backlight device exists
    on-resume = hyprshell controls/brightness-idle.sh restore # Restore brightness on activity
}

# // --- Listener: Lock after 120s idle ---
# Locks the session before DPMS off, so the screen is not visible after wake
listener {
    timeout = 120
    on-timeout = loginctl lock-session # Try system lock, fallback to $LOCKSCREEN
}

# // --- Listener: DPMS off after 300s idle ---
# Turns off display (but not if media is playing)
listener {
    timeout = 300
    on-timeout = hyprctl dispatch 'hl.dsp.dpms("off")' # Turn off display
    on-resume = hyprctl dispatch 'hl.dsp.dpms("on")'   # Turn display back on
}

# // --- Listener: Suspend after 500s idle ---
listener {
    timeout = 500
    on-timeout = systemctl suspend # Suspend system
}

# // --- Custom listeners ---
# hyprlang noerror true
# Source any additional listener configs from this path (wildcard supported)
# Note: 'source' is not supported by hypridle; keep this commented unless that changes upstream.
# source = ./hypridle/*
# hyprlang noerror false

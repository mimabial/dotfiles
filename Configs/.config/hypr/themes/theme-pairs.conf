# Theme light/dark pairs. Left = dark theme, right = light theme.
# Selecting a color mode whose polarity differs from the active theme switches to
# the paired theme instead of forcing a mismatched pywal variant. Themes with no
# explicit pair fall back to the defaults below.
Catppuccin Mocha = Catppuccin Latte
Forest Green = Forest Light
Gruvbox Retro = Melange
Nordic Blue = Bauhaus Blue
Moonlight = Frosted Glass
Graphite Retro = Vintage Gallery

default-dark = Catppuccin Mocha
default-light = Catppuccin Latte

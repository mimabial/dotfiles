# // █▀▀ █▀█ █▀▀ █░█ █▀
# // █▀░ █▄█ █▄▄ █▄█ ▄█

$WORKFLOW_ICON=󰽏
$WORKFLOW_DESCRIPTION = Focused workspace // Disables animations and blur with focus-mode geometry overrides

decoration {
    shadow {
        enabled = 0
    }
    blur {
        enabled = 0
        xray = 1
    }
    active_opacity = 0.99
    inactive_opacity = 0.99
    fullscreen_opacity = 0.99
}

general {
    gaps_in = 3
    gaps_out = 6
    border_size = 2
}

animations:enabled = 0
# misc:vfr was removed in newer Hyprland; the runtime handles frame pacing.

layerrule = animation none, match:namespace waybar
layerrule = animation none, match:namespace notifications
layerrule = animation none, match:namespace awww-daemon
layerrule = animation none, match:namespace rofi

windowrule = opacity 1.0 override 0.9 override, match:class ^(kitty)$
windowrule = opacity 1.0 override 0.9 override, match:class ^(Alacritty)$

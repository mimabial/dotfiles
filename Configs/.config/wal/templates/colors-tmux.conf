# ============================================================================
# Standard 16 color palette (from pywal16)
# ============================================================================
set -g @color0 "{color0}"     # black
set -g @color1 "{color1}"     # red
set -g @color2 "{color2}"     # green
set -g @color3 "{color3}"     # yellow
set -g @color4 "{color4}"     # blue
set -g @color5 "{color5}"     # magenta
set -g @color6 "{color6}"     # cyan
set -g @color7 "{color7}"     # white
set -g @color8 "{color8}"     # bright black (gray)
set -g @color9 "{color9}"     # bright red
set -g @color10 "{color10}"   # bright green
set -g @color11 "{color11}"   # bright yellow
set -g @color12 "{color12}"   # bright blue
set -g @color13 "{color13}"   # bright magenta
set -g @color14 "{color14}"   # bright cyan
set -g @color15 "{color15}"   # bright white

# ============================================================================
# Semantic color aliases
# ============================================================================
set -g @theme_bg "{background}"
set -g @theme_fg "{foreground}"
set -g @theme_accent "{color4}"
set -g @theme_gray "{color8}"
set -g @theme_highlight "{color4}"
set -g @theme_red "{color1}"
set -g @theme_brightred "{color9}"
set -g @theme_green "{color2}"
set -g @theme_yellow "{color3}"
set -g @theme_blue "{color4}"
set -g @theme_magenta "{color5}"
set -g @theme_cyan "{color6}"

# ============================================================================
# Tmux color settings
# ============================================================================
set -g status-style "bg=default,fg={foreground}"
set -g message-style "bg={background},fg={color4}"
set -g message-command-style "bg={background},fg={color4}"
set -g pane-border-style "fg={color8}"
set -g pane-active-border-style "fg={color4}"
set -g mode-style "bg={color4},fg={background}"
set -g window-status-style "fg={color8}"
set -g window-status-current-style "fg={color4},bold"
set -g clock-mode-colour "{color4}"

# xsettingsd configuration for GTK theme changes
# This daemon broadcasts X settings to all applications

Net/ThemeName "Red-Stone"
Net/IconThemeName "Tela-red-dark"
Gtk/CursorThemeName "Skyrim-cursors"
Gtk/CursorThemeSize 27
Gtk/FontName "Canterell 10"
Net/EnableEventSounds 1
Net/EnableInputFeedbackSounds 0
Xft/Antialias 1
Xft/Hinting 1
Xft/HintStyle "hintfull"
Xft/RGBA "rgb"
